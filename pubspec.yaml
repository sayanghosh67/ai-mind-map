name: ai_mind_map
description: "AI Handwritten Notes to Mind Map Generator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  google_mlkit_text_recognition: ^0.12.0
  image_picker: ^1.1.0
  graphview: ^1.2.0
  http: ^1.2.1
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  url_launcher: ^6.3.2
  flutter_animate: ^4.5.2
  share_plus: ^10.1.4
  screenshot: ^3.0.0
  google_generative_ai: ^0.4.6
  font_awesome_flutter: ^10.7.0
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
