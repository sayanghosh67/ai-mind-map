name: ai_mind_map
description: "AI Handwritten Notes to Mind Map Generator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  google_mlkit_text_recognition: ^0.12.0
  image_picker: ^1.1.0
  graphview: ^1.2.0
  http: ^1.2.1
  path_provider: ^2.1.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
